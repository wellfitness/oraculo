<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1024px;
  height: 500px;
  background: linear-gradient(135deg, #06b6d4 0%, #0891b2 60%, #0e7490 100%);
  font-family: 'Righteous', sans-serif;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 60px;
  overflow: hidden;
  position: relative;
}
@import url('https://fonts.googleapis.com/css2?family=Righteous&family=ABeeZee&display=swap');

/* Decorative circles */
body::before {
  content: '';
  position: absolute;
  top: -80px;
  right: -80px;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
}
body::after {
  content: '';
  position: absolute;
  bottom: -60px;
  left: -40px;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
}

.left {
  flex: 1;
  z-index: 1;
}

.logo-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}

.sparkle {
  font-size: 48px;
  color: rgba(255,255,255,0.9);
}

h1 {
  font-family: 'Righteous', cursive;
  font-size: 72px;
  color: white;
  letter-spacing: 2px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.15);
}

.subtitle {
  font-family: 'ABeeZee', sans-serif;
  font-size: 22px;
  color: rgba(255,255,255,0.95);
  margin-bottom: 8px;
  font-weight: normal;
}

.tagline {
  font-family: 'ABeeZee', sans-serif;
  font-size: 17px;
  color: rgba(255,255,255,0.7);
  font-style: italic;
}

.right {
  display: flex;
  gap: 14px;
  z-index: 1;
  align-items: center;
}

.feature-pill {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 16px;
  padding: 18px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 110px;
}

.feature-pill .icon {
  font-size: 32px;
  color: white;
}

.feature-pill .label {
  font-family: 'ABeeZee', sans-serif;
  font-size: 12px;
  color: rgba(255,255,255,0.9);
  text-align: center;
  line-height: 1.3;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
</head>
<body>
  <div class="left">
    <h1>Oráculo</h1>
    <p class="subtitle">Gestión personal consciente<br>para mujeres +40</p>
    <p class="tagline">No puedes hacerlo todo. Y está bien.</p>
  </div>
  <div class="right">
    <div class="feature-pill">
      <span class="material-symbols-outlined icon">diamond</span>
      <span class="label">Foco<br>diario</span>
    </div>
    <div class="feature-pill">
      <span class="material-symbols-outlined icon">science</span>
      <span class="label">Hábitos<br>atómicos</span>
    </div>
    <div class="feature-pill">
      <span class="material-symbols-outlined icon">directions_run</span>
      <span class="label">Breaks<br>Muévete</span>
    </div>
    <div class="feature-pill">
      <span class="material-symbols-outlined icon">auto_stories</span>
      <span class="label">Diario<br>reflexivo</span>
    </div>
  </div>
</body>
</html>
